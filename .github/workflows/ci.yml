# ctrl-tree CI — Clojure test suite
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  clojure:
    name: Clojure tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ctrl-tree
      - uses: actions/checkout@v4
        with:
          repository: nomos-studio/protomatter
          path: protomatter
      - uses: actions/checkout@v4
        with:
          repository: nomos-studio/txlog
          path: txlog
      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('ctrl-tree/project.clj', 'protomatter/project.clj', 'txlog/clj/project.clj') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          lein: latest
      - name: Install protomatter
        run: lein install
        working-directory: protomatter
      - name: Install txlog
        run: lein install
        working-directory: txlog/clj
      - name: Run test suite
        run: lein test
        working-directory: ctrl-tree
